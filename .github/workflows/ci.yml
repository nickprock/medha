name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests / python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,qdrant,fuzzy]"

      - name: Security scan (Bandit)
        continue-on-error: true
        run: |
          python -m pip install bandit
          bandit -r src/ -ll

      - name: Dependency scan (Safety)
        continue-on-error: true
        run: |
          python -m pip install safety
          safety check

      - name: Compile source and tests
        run: python -m compileall -q src tests

      - name: Run no-service tests
        # The Gemini adapter tests currently mock a provider-specific API shape;
        # keep this first CI baseline focused on checks that are green today.
        run: >
          pytest tests/unit tests/integration
          --ignore=tests/unit/test_gemini_adapter.py
          -m "not slow and not pgvector and not vectorchord and not elasticsearch and not redis and not azure_search"

  package:
    name: package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel and import package
        run: |
          python -m pip install dist/*.whl
          python -c "import medha; print(medha.__version__)"

          
  secrets-scan:
    name: secret scanning
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        continue-on-error: true
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
